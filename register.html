<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作問の森 - クイズ登録</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>クイズを登録する</h1>
        
        <div class="form-box">
            <div class="form-group">
                <label for="creator">お名前（作った人）</label>
                <input type="text" id="creator" placeholder="なまえを入力してね">
            </div>
            
            <div class="form-group">
                <label for="question">問題文</label>
                <input type="text" id="question" placeholder="クイズの問題を入力してね">
            </div>
            
            <div class="form-group">
                <label for="answer">こたえ</label>
                <input type="text" id="answer" placeholder="クイズの答えを入力してね">
            </div>
            
            <button id="submit-btn" class="btn btn-register">登録する</button>
        </div>

        <div class="navigation">
            <a href="index.html" class="link-back">← ホームに戻る</a>
        </div>
    </div>
  
</body>
</html>
