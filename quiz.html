<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作問の森 - クイズにちょうせん！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="forest-mode">

    <header class="forest-header">
        <a href="index.html" class="btn-home">🏠 おうちへかえる</a>
        <h1>🌳 作問の森 - みんなでクイズ 🌳</h1>
        <div class="header-spacer"></div>
    </header>

    <main class="game-board" id="game-board">
        <div class="info-bar">
            
            <div class="action-buttons">
            </div>
        </div>

        <div class="team-status">
            <div class="status-item">
                <span class="label">問題</span>
                <span class="value" id="question-number">1/2</span>
            </div>
            <div class="status-item">
                <span class="label">正解数</span>
                <span class="value" id="correct-count">0/5</span>
            </div>
            <div class="status-item">
                <span class="label">残り時間</span>
                <span class="value" id="time-left">90秒</span>
            </div>
        </div>

        <div class="question-area">
            <p id="question-meta" class="question-meta">ジャンル: 読み込み中</p>
            <h2 id="question-text">Q. 読み込み中...</h2>
            <p id="question-author" class="question-author">作問者: 読み込み中</p>
            
            <div class="time-bar-container">
                <div class="time-bar" id="time-bar"></div>
            </div>
        </div>

        <!-- 答えボード（みんなで埋める黒板） -->
        <div class="answer-board">
            <div class="answer-slot" id="slot-answer-0">
                <span class="slot-icon">❓</span>
                <span class="slot-answer"></span>
            </div>
            <div class="answer-slot" id="slot-answer-1">
                <span class="slot-icon">❓</span>
                <span class="slot-answer"></span>
            </div>
            <div class="answer-slot" id="slot-answer-2">
                <span class="slot-icon">❓</span>
                <span class="slot-answer"></span>
            </div>
            <div class="answer-slot" id="slot-answer-3">
                <span class="slot-icon">❓</span>
                <span class="slot-answer"></span>
            </div>
            <div class="answer-slot" id="slot-answer-4">
                <span class="slot-icon">❓</span>
                <span class="slot-answer"></span>
            </div>
        </div>

        <div class="input-area">
            <div id="current-turn-label"> 書記さん、みんなの答えを入力してね！</div>
            <input type="text" id="answer-input" placeholder="こたえを入力してEnter！">
            <div id="feedback" class="feedback"></div>
        </div>
    </main>

    <div class="result-overlay" id="result-screen" style="display: none;">
        <div class="result-dialog" id="result-dialog">
            <h1 id="result-title">結果</h1>
            <p id="result-message">メッセージ</p>
            <p id="result-answer" class="result-answer"></p>

            <div class="rating-panel" id="rating-panel">
                <h3 id="rating-title">この問題を評価してね</h3>
                <p id="rating-message">作問者へのフィードバックとして、押してみよう！</p>
                <div class="rating-buttons">
                    <button type="button" class="rating-btn" data-key="fun" id="rating-btn-fun">❤️ 面白かった <span id="rating-fun-count">0</span></button>
                    <button type="button" class="rating-btn" data-key="useful" id="rating-btn-useful">💡 勉強になった <span id="rating-useful-count">0</span></button>
                    <button type="button" class="rating-btn" data-key="difficult" id="rating-btn-difficult">🔥 難しかった <span id="rating-difficult-count">0</span></button>
                </div>
            </div>

            <button class="btn-home" id="btn-next-question" type="button">次の問題へ</button>
            <button class="btn-home" id="btn-replay" type="button" style="display:none; margin-top: 10px;">もう一度あそぶ</button>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
