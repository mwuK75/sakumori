<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>作問の森 - ホーム画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="forest-mode">
    <header class="forest-header">
        <h1>🌳 作問の森</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="container home-container">
        <div class="hero-card">
            <img src="picture/logo.png" alt="作問の森ロゴ" class="site-logo">
            <p class="subtitle">みんなが作った問題を集めてクイズ大会をしよう！</p>

            <div class="menu-box">
                <button id="open-start-modal" class="btn btn-play">クイズを解く</button>
                <div id="start-modal" class="start-modal">

    <div class="start-modal-content">

        <h2>🌳 クイズの準備</h2>

        <p>あなたの名前（班名でもOK）</p>

        <input
            type="text"
            id="player-name"
            placeholder="名前を入力">

        <h3>出題ジャンル</h3>

        <div class="genre-list">

            <label><input type="checkbox" value="国語">国語</label>

            <label><input type="checkbox" value="算数">算数</label>

            <label><input type="checkbox" value="英語">英語</label>

            <label><input type="checkbox" value="理科">理科</label>

            <label><input type="checkbox" value="地理">地理</label>

            <label><input type="checkbox" value="歴史">歴史</label>

            <label><input type="checkbox" value="その他">その他</label>

        </div>

        <button
            id="start-quiz-btn"
            class="btn btn-play">

            スタート

        </button>

    </div>

</div>
            </div>
        </div>        <section class="ranking-card">
            <h2>🏆 人気問題ランキング</h2>
            <p class="ranking-description">面白かった・勉強になった・難しかったの合計で並べています。</p>
            <ol id="ranking-list" class="ranking-list"></ol>
        </section>
                <a href="teacher.html" class="btn btn-play">システム導入ガイド</a>
    </div>

    <script src="index.js"></script>
</body>
</html>
